name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: ["**"]

jobs:
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev
      - name: Lint
        working-directory: backend
        run: uv run ruff check .
      - name: Format check
        working-directory: backend
        run: uv run ruff format --check .

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev
      - name: Run tests
        working-directory: backend
        run: uv run pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Check for undefined design tokens
        working-directory: web
        run: |
          CSS=$(cat src/styles/app.css)
          THEME_TOKENS=$(echo "$CSS" | grep -oP '(?<=--)[a-zA-Z0-9_-]+(?=:)' | sort -u)
          echo "Defined tokens: $THEME_TOKENS"
          UNDEFINED=$(grep -rE 'className=["\'][^"\']*\b(text|border|bg|divide)-([a-zA-Z0-9_-]+)\b' src --include="*.tsx" | grep -oP '(text|border|bg|divide)-\K[a-zA-Z0-9_-]+' | sort -u | while read token; do
            if ! echo "$THEME_TOKENS" | grep -qx "$token"; then
              echo "$token"
            fi
          done)
          if [ -n "$UNDEFINED" ]; then
            echo "ERROR: Undefined design tokens found:"
            echo "$UNDEFINED"
            exit 1
          fi
          echo "All tokens defined"
      - name: Build
        working-directory: web
        run: npm run build

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Run tests
        working-directory: web
        run: npm test -- --reporter=default

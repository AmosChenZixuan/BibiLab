name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev
      - name: Lint
        working-directory: backend
        run: uv run ruff check .
      - name: Format check
        working-directory: backend
        run: uv run ruff format --check .

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev
      - name: Run tests
        working-directory: backend
        run: uv run pytest

  plugin-lint:
    name: Plugin lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: plugin
        run: npm install
      - name: Lint
        working-directory: plugin
        run: npm run lint

services:
  bibilab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    image: bibilab:${TORCH_VARIANT:-cpu}
    # Run as the host user so files written to the bind mount stay user-owned and
    # interchangeable with a native install. install.sh writes UID/GID to .env;
    # :? refuses to silently default to 1000:1000 if those env vars are unset
    # (which would land bind-mount writes under a foreign uid).
    user: "${UID:?UID must be set; run ./install.sh}:${GID:?GID must be set}"
    environment:
      BIBILAB_HOME: /data
      # Pin the in-container bind port to the mapped host port below, independent of
      # any custom backend.port in the bind-mounted (host-shared) config.json.
      BIBILAB_PORT: 8765
    volumes:
      - ${HOME}/.bibilab:/data
    ports:
      - "8765:8765"
    restart: unless-stopped

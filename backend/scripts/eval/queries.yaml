# RAG Retrieval Evaluation Query Set (#220 + #234)
#
# Lists are resolved by name at runtime via the DB. Edit list names to match
# your environment. Add or remove queries freely — sweep and score scripts
# read from this file.

sweep:
  rrf_k: [30, 60, 90]
  floor: [null, -2.0, 0.0]

